<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>жқұй–Җеә«еӯҳзӣӨй»һзі»зөұ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* дҪҺж–јеә«еӯҳеҸҚзҙ…жЁЈејҸ */
        .low-stock-row { background-color: #fee2e2 !important; color: #b91c1c; font-weight: bold; }
        .header-bg { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
        .info-text { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .safety-tag { color: #2563eb; font-size: 0.75rem; font-weight: normal; margin-left: 4px; }
        .unit-text { font-size: 0.75rem; font-weight: 900; color: #475569; }
        .iphone-container { max-width: 430px; margin-left: auto; margin-right: auto; }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        textarea { resize: none; overflow: hidden; min-height: 80px; }
        
        /* еўһеҠ жүӢж©ҹй»һж“Ҡж„ҹ */
        .btn-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-2 info-text">

    <div id="captureArea" class="iphone-container shadow-2xl rounded-2xl overflow-hidden mb-10 bg-white border border-gray-100">
        <!-- й ӮйғЁжЁҷйЎҢеҚҖеҹҹ -->
        <div class="header-bg text-white p-6 text-center">
            <h1 class="text-2xl font-bold tracking-widest mb-1">жқұй–Җеә«еӯҳзӣӨй»һзі»зөұ</h1>
            <p id="displayDate" class="text-sm opacity-90"></p>
        </div>

        <div class="p-4">
            <!-- зӣӨй»һдәәе“ЎиҲҮе» е•ҶиіҮиЁҠеҚҖеЎҠ -->
            <div class="mb-6 border-b-2 border-gray-100 pb-4">
                <div class="flex items-center mb-4">
                    <label class="text-xl font-bold mr-2 text-gray-800 whitespace-nowrap">зӣӨй»һдәәе“Ўпјҡ</label>
                    <input type="text" id="signer" class="text-xl border-b-2 border-gray-300 focus:border-blue-600 outline-none px-1 w-full bg-transparent" placeholder="и«ӢеЎ«еҜ«е§“еҗҚ">
                </div>

                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <h3 class="text-sm font-bold text-slate-700 mb-1">еҸ«иІЁе» е•ҶиіҮиЁҠ</h3>
                    <div class="grid grid-cols-1 gap-y-0.5 text-sm text-slate-500">
                        <div class="flex justify-between"><span>йӨҠз”ҹе Ӯ</span> <span>03-6661399</span></div>
                        <div class="flex justify-between"><span>иҒҜж…¶</span> <span>03-5225353</span></div>
                        <div class="flex justify-between"><span>пјёпјҜйҶ¬</span> <span>06-9273596</span></div>
                        <div class="flex justify-between"><span>еҢ—жөҰиҫЈжӨ’</span> <span>0927-881136</span></div>
                        <div class="flex justify-between"><span>дёӯиҸҜзҙҷжқҜ</span> <span>03-5436430</span></div>
                        <div class="flex justify-between"><span>еҚғжҪ”зҙҷжқҜ</span> <span>03-5364988</span></div>
                        <p class="text-xs text-blue-500 mt-1 font-medium">е…¶йӨҳе» е•Ҷж–ј LINE е®ҳж–№иҒҜзөЎ</p>
                    </div>
                </div>
                
                <div class="flex gap-2 mt-4">
                    <button onclick="copyData()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-md transition btn-active text-sm text-center">иӨҮиЈҪеӣһе ұж–Үеӯ—</button>
                    <button onclick="exportExcel()" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-md transition btn-active text-sm text-center">еҢҜеҮә Excel</button>
                </div>
            </div>

            <!-- зӣӨй»һеҲ—иЎЁеӢ•ж…ӢжҸ’е…Ҙ -->
            <div id="inventoryLists"></div>

            <!-- иҮӘиЎҢијёе…ҘеҚҖеЎҠ -->
            <div class="mt-8 space-y-6 pb-6">
                <!-- д»Ҡж—ҘеҸ«иІЁ -->
                <div class="border-t-2 border-gray-100 pt-4">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="bg-orange-600 px-3 py-1.5 font-bold text-white rounded-lg text-base shadow-sm">д»Ҡж—ҘеҸ«иІЁзҙҖйҢ„</h2>
                        <input type="date" id="orderDate" class="text-sm border rounded px-1 text-gray-600">
                    </div>
                    <textarea id="orderNotes" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:border-orange-500 outline-none bg-orange-50/30" placeholder="и«ӢжүӢеӢ•ијёе…Ҙд»Ҡж—ҘеҸ«иІЁе“Ғй …..."></textarea>
                </div>

                <!-- д»Ҡж—ҘйҖІиІЁ -->
                <div class="border-t-2 border-gray-100 pt-4">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="bg-green-600 px-3 py-1.5 font-bold text-white rounded-lg text-base shadow-sm">д»Ҡж—ҘйҖІиІЁзҙҖйҢ„</h2>
                        <input type="date" id="receiveDate" class="text-sm border rounded px-1 text-gray-600">
                    </div>
                    <textarea id="receiveNotes" class="w-full border border-gray-200 rounded-lg p-3 text-sm focus:border-green-500 outline-none bg-green-50/30" placeholder="и«ӢжүӢеӢ•ијёе…Ҙд»Ҡж—ҘеҲ°иІЁе…§е®№..."></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        const today = new Date();
        const isoDate = today.toISOString().split('T')[0];
        const todayStr = today.toLocaleDateString('zh-TW', {year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'});
        
        document.getElementById('displayDate').innerText = `зӣӨй»һж—Ҙжңҹпјҡ${todayStr}`;
        document.getElementById('orderDate').value = isoDate;
        document.getElementById('receiveDate').value = isoDate;

        // еә«еӯҳж•ёж“ҡй…ҚзҪ® - ж №ж“ҡжңҖж–°йңҖжұӮж–°еўһ
        const sections = [
            {
                name: "1FеҶ·и—Ҹ", alert: true,
                items: [
                    { n: "ж—ҘејҸйҶ¬", u: "(з“¶)", s: 4 },
                    { n: "зҫҺд№ғж»Ӣ", u: "(з“¶)", s: 2 },
                    { n: "й«ҳйә—иҸң", u: "(иўӢ)", s: 2 },
                    { n: "иұҶжјҝ жңүзі–", u: "(еҢ…)", s: 4 },
                    { n: "иұҶжјҝ з„Ўзі–", u: "(еҢ…)", s: 2 },
                    { n: "XOйҶ¬", u: "(зҪҗ)", s: 4 },
                    { n: "иҫЈжӨ’йҶ¬", u: "(зҪҗ)", s: 3 }
                ]
            },
            {
                name: "1FеҶ·еҮҚ", alert: true,
                items: [
                    { n: "йӣһеЎҠ", u: "(еҢ…)", s: 5 },
                    { n: "и–Ҝжўқ", u: "(еҲҶиЈқиўӢ)", s: 1 },
                    { n: "еҸҜжЁӮйӨ…", u: "(еҢ…)", s: 1 },
                    { n: "зӮёиқҰ", u: "(зӣ’)", s: 2 },
                    { n: "з”ңдёҚиҫЈ", u: "(еҢ…)", s: 2 },
                    { n: "иҠұжһқдёё", u: "(еҢ…)", s: 2 },
                    { n: "йӣһжҺ’", u: "(еҢ…)", s: 3 },
                    { n: "и¶…еҺҡиұ¬жҺ’", u: "(еҢ…)", s: 4 },
                    { n: "й№Ҫй…ҘжқҸй®‘иҸҮ", u: "(еҢ…)", s: 1 },
                    { n: "е”җжҸҡйӣһ", u: "(еҢ…)", s: 4 },
                    { n: "иұ¬иӮү", u: "(еҢ…)", s: 4 },
                    { n: "зүӣиӮү", u: "(еҢ…)", s: 3 }
                ]
            },
            {
                name: "1FеӮҷе“Ғ", alert: true,
                items: [
                    { n: "е”җжҸҡйӣһзІү", u: "(еҢ…)", s: 3 },
                    { n: "ж–°йҚӢеӯҗ", u: "(еҖӢ)", s: 3 },
                    { n: "10ж–ӨиўӢ", u: "(еҢ…)", s: 2 },
                    { n: "3ж–ӨиўӢ", u: "(еҢ…)", s: 1 },
                    { n: "6е…©иўӢ", u: "(еҢ…)", s: 1 },
                    { n: "3е…©иўӢ", u: "(еҢ…)", s: 2 },
                    { n: "й»ғиўӢ", u: "(еҢ…)", s: 2 },
                    { n: "з¶ иўӢ", u: "(еҢ…)", s: 3 },
                    { n: "зҙ…иўӢ", u: "(еҢ…)", s: 2 },
                    { n: "902зў—", u: "(жўқ)", s: 2 },
                    { n: "902и“Ӣ", u: "(жўқ)", s: 2 }
                ]
            },
            {
                name: "B1еӮҷе“Ғ", alert: true,
                items: [
                    { n: "XOйҶ¬", u: "(зҪҗ)", s: 3 },
                    { n: "иҫЈжӨ’йҶ¬", u: "(зҪҗ)", s: 5 },
                    { n: "е”җжҸҡйӣһзІү", u: "(з®ұ)", s: 1 }
                ]
            }
        ];

        const container = document.getElementById('inventoryLists');

        function renderTables() {
            if (!container) return;
            if (sections.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 py-10">зӣ®еүҚе°ҡз„Ўе“Ғй …пјҢи«Ӣж–°еўһиіҮж–ҷгҖӮ</p>';
                return;
            }
            container.innerHTML = "";
            sections.forEach(sec => {
                let tableHtml = `
                    <div class="mb-8">
                        <h2 class="bg-slate-800 px-3 py-1.5 font-bold text-white rounded-lg text-base shadow-sm inline-block">${sec.name}</h2>
                        <table class="w-full text-left mt-2 border-collapse" data-sec="${sec.name}">
                            <thead>
                                <tr class="text-xs text-gray-400 border-b">
                                    <th class="py-2 px-1">е“Ғй …еҗҚзЁұ</th><th class="w-24 text-center">зӣӨй»һж•ёйҮҸ</th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                sec.items.forEach(item => {
                    tableHtml += `
                        <tr class="border-b border-gray-50 last:border-0 transition">
                            <td class="py-3 px-1">
                                <span class="text-gray-800 font-bold text-sm item-name">${item.n}</span>
                                <span class="unit-text ml-0.5">${item.u}</span>
                                <span class="safety-tag">жңҖдҪҺ:${item.s}</span>
                            </td>
                            <td class="py-1 text-right">
                                <input type="number" 
                                    class="w-20 border border-gray-200 rounded-lg p-2 text-center font-bold text-blue-800 text-xl focus:border-blue-500 outline-none qty-input bg-gray-50"
                                    data-name="${item.n}"
                                    data-unit="${item.u}"
                                    data-safety="${item.s}" 
                                    data-alert="${sec.alert}"
                                    inputmode="numeric"
                                    oninput="validate(this)">
                            </td>
                        </tr>
                    `;
                });
                tableHtml += `</tbody></table></div>`;
                container.innerHTML += tableHtml;
            });
        }

        function validate(el) {
            const val = parseFloat(el.value);
            const safety = parseFloat(el.dataset.safety);
            const needsAlert = el.dataset.alert === "true";
            const row = el.closest('tr');
            if (needsAlert && !isNaN(val) && val < safety) {
                row.classList.add('low-stock-row');
            } else {
                row.classList.remove('low-stock-row');
            }
        }

        async function copyData() {
            const signer = document.getElementById('signer').value || "жңӘз°ҪеҗҚ";
            let text = `рҹ“Ұ гҖҗжқұй–Җеә—еә«еӯҳзӣӨй»һгҖ‘\nрҹ“… ж—Ҙжңҹпјҡ${todayStr}\nрҹ‘Ө дәәе“Ўпјҡ${signer}\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\n`;
            
            const tables = document.querySelectorAll('table');
            if (tables.length === 0) {
                text += "\n(з„ЎзӣӨй»һиіҮж–ҷ)\n";
            } else {
                tables.forEach(table => {
                    text += `\nгҖҗ${table.dataset.sec}гҖ‘\n`;
                    table.querySelectorAll('tbody tr').forEach(row => {
                        const name = row.querySelector('.item-name').innerText;
                        const unit = row.querySelector('.unit-text').innerText;
                        const input = row.querySelector('.qty-input');
                        const val = input.value;
                        const isLow = row.classList.contains('low-stock-row');
                        const prefix = isLow ? `рҹҡЁ ` : `рҹ”№ `;
                        
                        if(val !== "") {
                            text += `${prefix}${name} ${unit}пјҡ${val}\n`;
                        }
                    });
                });
            }

            const orders = document.getElementById('orderNotes').value.trim();
            const receives = document.getElementById('receiveNotes').value.trim();
            const orderDate = document.getElementById('orderDate').value;
            const receiveDate = document.getElementById('receiveDate').value;

            text += `\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹ“қ д»Ҡж—ҘеҸ«иІЁ (${orderDate})\n${orders || "(з„Ў)"}\n`;
            text += `\nв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ\nрҹҡҡ д»Ҡж—ҘйҖІиІЁ (${receiveDate})\n${receives || "(з„Ў)"}\n`;

            try {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast("вң… иіҮж–ҷе·ІиӨҮиЈҪеҲ°еүӘиІјз°ҝ");
            } catch (err) {
                alert("иӨҮиЈҪеӨұж•—пјҢи«ӢжүӢеӢ•йҒёеҸ–ж–Үеӯ—");
            }
        }

        function exportExcel() {
            const signer = document.getElementById('signer').value || "жңӘз°ҪеҗҚ";
            const exportData = [
                ["жқұй–Җеә«еӯҳзӣӨй»һиЎЁ"], ["зӣӨй»һж—Ҙжңҹ", todayStr], ["зӣӨй»һдәәе“Ў", signer], [],
                ["еҚҖеҹҹ", "е“Ғй …", "зӣӨй»һж•ёйҮҸ", "е–®дҪҚ", "жңҖдҪҺеә«еӯҳ", "зӢҖж…Ӣ"]
            ];

            const tables = document.querySelectorAll('table');
            tables.forEach(table => {
                const area = table.dataset.sec;
                table.querySelectorAll('tbody tr').forEach(row => {
                    const name = row.querySelector('.item-name').innerText;
                    const unit = row.querySelector('.unit-text').innerText;
                    const input = row.querySelector('.qty-input');
                    const qty = input.value;
                    const safety = input.dataset.safety;
                    const status = row.classList.contains('low-stock-row') ? "рҹҡЁ еә«еӯҳдёҚи¶і" : (qty === "" ? "-" : "жӯЈеёё");
                    exportData.push([area, name, qty, unit, safety, status]);
                });
            });

            const orders = document.getElementById('orderNotes').value.trim();
            const receives = document.getElementById('receiveNotes').value.trim();
            exportData.push([], ["еӮҷиЁ»й …зӣ®"]);
            exportData.push(["д»Ҡж—ҘеҸ«иІЁ", orders || "з„Ў"]);
            exportData.push(["д»Ҡж—ҘйҖІиІЁ", receives || "з„Ў"]);

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(exportData);
            XLSX.utils.book_append_sheet(wb, ws, "еә«еӯҳж•ёж“ҡ");
            XLSX.writeFile(wb, `жқұй–ҖзӣӨй»һ_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl text-sm z-50 text-center shadow-lg";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderTables();
            document.querySelectorAll('textarea').forEach(ta => {
                ta.addEventListener('input', function() {
                    this.style.height = 'auto';
                    this.style.height = (this.scrollHeight) + 'px';
                });
            });
        });
    </script>
</body>
</html>
